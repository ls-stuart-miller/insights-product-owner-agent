# squad.yaml — Reporting, Insights & Benchmarks team configuration
#
# PTO is NOT tracked here — it is confirmed via a live prompt at the start of
# each sprint planning run. This avoids stale values between sprints.
#
# IMPORTANT: Repository assignments below are reasonable defaults based on role.
# Please confirm with each engineer and update primary_repos / secondary_repos accordingly.
#
# NOTE: Divyang Joshi's Jira email had a typo in the source file (missing @).
# Assumed to be divyang.joshi@lightspeedhq.com — please confirm.

squad:
  name: Reporting, Insights & Benchmarks
  jira_project: LSH
  jira_team_name: "Reporting, Insights & Benchmarks (HOS)"
  jira_team_uuid: "857e08e4-972a-4190-af30-e215a842ffba"
  github_org: lightspeed-hospitality
  sprint_cadence_days: 14
  velocity_lookback_sprints: 5
  ceremony_overhead_pct: 15  # standups, sprint ceremonies, misc meetings (~15% of sprint)

  # Repos owned by this team
  repos:
    - insights-service           # backend: Insights data service
    - lighthouse-insights        # frontend: current reports UI
    - open-search-service        # backend: search and query layer
    - automated-reporting-service  # backend: automated report generation
    - hospitality-platform       # frontend: migration target for new components

members:

