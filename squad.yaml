    title: Team Lead
    is_team_lead: true
    primary_repos:
      - insights-service
    secondary_repos:
      - open-search-service
      - automated-reporting-service
    capacity_days_per_sprint: 2  # 2–3 days — primarily operating as manager
    notes: >
      Engineering manager — capacity is already reduced to reflect management
      duties. Assign only the highest-complexity backend work that requires
      his direct involvement. Do not apply an additional TL buffer on top of
